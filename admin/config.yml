backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"

collections:
  - name: "staff"
    label: "Staff Announcements"
    folder: "content/staff"
    create: true
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "body", label: "Body", widget: "markdown" }

